<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulangan Matematika</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
img{
    width:100%;
    border-radius:10px;
}
.question{
    margin-top:20px;
}
button{
    margin-top:20px;
    padding:10px 20px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.result{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <h1>Ulangan Matematika</h1>

    <p>Perhatikan gambar berikut:</p>

    <img src="gambar-papan.jpg" alt="Materi Matematika">

    <div class="question">
        <p>1. Berapa nilai 150° dalam radian?</p>
        <input type="radio" name="q1" value="a"> π/2<br>
        <input type="radio" name="q1" value="b"> 5π/6<br>
        <input type="radio" name="q1" value="c"> 2π/3<br>
    </div>

    <div class="question">
        <p>2. Berapa nilai tan 135°?</p>
        <input type="radio" name="q2" value="a"> 1<br>
        <input type="radio" name="q2" value="b"> -1<br>
        <input type="radio" name="q2" value="c"> 0<br>
    </div>

    <div class="question">
        <p>3. Titik potong sumbu Y yang tertulis pada papan adalah?</p>
        <input type="radio" name="q3" value="a"> (0,4)<br>
        <input type="radio" name="q3" value="b"> (4,0)<br>
        <input type="radio" name="q3" value="c"> (2,3)<br>
    </div>

    <button onclick="cekJawaban()">Selesai</button>

    <div class="result" id="hasil"></div>
</div>

<script>
function cekJawaban(){
    let skor = 0;

    if(document.querySelector('input[name="q1"]:checked')?.value==="b") skor++;
    if(document.querySelector('input[name="q2"]:checked')?.value==="b") skor++;
    if(document.querySelector('input[name="q3"]:checked')?.value==="a") skor++;

    document.getElementById("hasil").innerHTML =
        "Nilai Anda: " + (skor*100/3).toFixed(0);
}
</script>

</body>
</html>
