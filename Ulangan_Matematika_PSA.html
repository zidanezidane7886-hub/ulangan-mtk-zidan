<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulangan Matematika PSA</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:20px}
.box{max-width:900px;margin:auto;background:white;padding:20px;border-radius:12px}
img{max-width:100%;border-radius:10px}
button{padding:10px 20px;font-size:16px}
.soal{margin:20px 0}
</style>
</head>
<body>
<div class="box">
<h1>Ulangan Matematika PSA</h1>
<p>Tambahkan gambar papan tulis kamu dengan nama <b>gambar-papan.jpg</b> di folder yang sama.</p>

<img src="gambar-papan.jpg" alt="Materi">

<div class="soal">
<p>1. 150° sama dengan ... radian</p>
<label><input type="radio" name="q1" value="0"> π/2</label><br>
<label><input type="radio" name="q1" value="1"> 5π/6</label><br>
<label><input type="radio" name="q1" value="0"> 2π/3</label>
</div>

<div class="soal">
<p>2. Nilai tan 135° adalah ...</p>
<label><input type="radio" name="q2" value="0"> 1</label><br>
<label><input type="radio" name="q2" value="1"> -1</label><br>
<label><input type="radio" name="q2" value="0"> 0</label>
</div>

<div class="soal">
<p>3. Titik potong dengan sumbu Y yang tertulis adalah ...</p>
<label><input type="radio" name="q3" value="1"> (0,4)</label><br>
<label><input type="radio" name="q3" value="0"> (4,0)</label><br>
<label><input type="radio" name="q3" value="0"> (2,3)</label>
</div>

<button onclick="cek()">Kirim Jawaban</button>
<h2 id="hasil"></h2>

<script>
function cek(){
 let skor=0;
 document.querySelectorAll('input[type=radio]:checked').forEach(x=>skor+=Number(x.value));
 document.getElementById('hasil').innerText='Nilai: '+Math.round((skor/3)*100);
}
</script>
</div>
</body>
</html>
